name: Test
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      SYNAPSE_API_KEY: ${{ secrets.SYNAPSE_TEST_API_KEY }}
      SYNAPSE_WORKSPACE_ID: ${{ secrets.SYNAPSE_TEST_WORKSPACE_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
      - run: composer install --no-interaction --prefer-dist
      - run: chmod +x test.sh && bash test.sh
